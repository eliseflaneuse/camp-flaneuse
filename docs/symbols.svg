  <text x="828" y="165" font-size="12" fill="#8a7f6a" text-anchor="middle" font-family="Consolas, monospace">book</text>

  <!-- brush · clay deep -->
  <g transform="translate(870, 84) scale(2)" fill="none" stroke="#8a4630" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
